<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Tareas Pro</title>

  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <div class="container">

    <h1>📋 Gestión de Tareas</h1>

    <!-- DASHBOARD -->
    <div class="stats">
      <p>Total: <span id="total">0</span></p>
      <p>Progreso: <span id="progress">0%</span></p>
      <p>Urgentes: <span id="urgent">0</span></p>
    </div>

    <!-- THEME -->
    <button id="theme-toggle">🌙 Modo</button>

    <!-- FORM -->
    <form id="task-form">
      <input type="text" id="task-input" placeholder="Nueva tarea..." />
      
      <select id="priority">
        <option value="Alta">Alta</option>
        <option value="Media">Media</option>
        <option value="Baja">Baja</option>
      </select>

      <button>Agregar</button>
    </form>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Buscar tarea...">

    <!-- FILTERS -->
    <div class="filters">
      <button data-filter="all">Todas</button>
      <button data-filter="pending">Pendientes</button>
      <button data-filter="completed">Completadas</button>
    </div>

    <!-- LIST -->
    <ul id="task-list"></ul>

  </div>

  <script type="module" src="./js/app.js"></script>

</body>
</html>
